type: custom:stack-in-card
cards:
  - type: custom:mushroom-template-card
    entity: sensor.octoprint_current_state
    primary: Ender 3v2
    tap_action:
      action: toggle
    secondary: |-
      {% if is_state(entity, 'printing') or
      is_state(entity, 'resuming') or
      is_state(entity, 'pausing') or
      is_state(entity, 'paused') %}
        {{ (states('sensor.octoprint_job_percentage') | round(0) )}}% {{ states(entity) }} {{ states('sensor.octoprint_current_file')}}
      {% else %}
        {{ states(entity) }}
      {% endif %}       
    icon: >-
      {% if is_state(entity, 'operational') %}
        mdi:printer-3d
      {% elif is_state(entity, 'printing') or is_state(entity,'resuming') or
      is_state(entity,'pausing') or is_state(entity,'Paused') %}
        mdi:printer-3d-nozzle
      {% elif is_state(entity, 'cancelling') or is_state(entity,'error') or
      is_state(entity, 'offline_after_error') %}
        mdi:close-octagon
      {% elif is_state(entity, 'unavailable') or is_state(entity,'unknown') %}
        mdi:printer-3d-off
      {% endif %}
    icon_color: >-
      {% if is_state(entity, 'printing') %}
        green
      {% elif is_state(entity, 'paused') or is_state(entity,'pausing') %}
        #fc6d09
      {% elif is_state(entity, 'cancelling') or is_state(entity,'error') or
      is_state(entity, 'offline_after_error') %}
        red
      {% else %}
        var(--primary-text-color)
      {% endif %}
    badge_icon: |-
      {% if is_state(entity, 'paused') or is_state(entity,'pausing') %}
        mdi:pause
      {% elif is_state(entity, 'resuming') %}
        mdi:play
      {% endif %}
    badge_color: |-
      {% if is_state(entity, 'Paused') or is_state(entity,'pausing') %}
        grey
      {% elif is_state(entity, 'resuming') %}
        green
      {% endif %}
    card_mod:
      style:
        mushroom-shape-icon$: |
          .shape {
            {% if is_state(entity, 'printing') or
            is_state(entity,'resuming') %}
              background: radial-gradient(var(--card-background-color) 60%, transparent 0%), conic-gradient(rgb(252,109,9) {{ states('sensor.octoprint_job_percentage') | round(0) }}% 0%, var(--card-background-color) 0% 100%);
            {% elif is_state(entity, 'operational') %}
              background: radial-gradient(var(--card-background-color) 60%, transparent 0%), conic-gradient(rgb(53,190,37) 100% 0%, var(--card-background-color) 0% 100%);              
            {% elif is_state(entity, 'cancelling') or
            is_state(entity, 'error') or
            is_state(entity, 'offline_after_error') %}
              background: radial-gradient(var(--card-background-color) 60%, transparent 0%), conic-gradient(red 100% 0%, var(--card-background-color) 0% 100%);              
            {% else %}
              background: radial-gradient(var(--card-background-color) 60%, transparent 0%), conic-gradient(#9e9e9e {{ states('sensor.octoprint_job_percentage') | round(0) }}% 0%, var(--card-background-color) 0% 100%);
            {% endif %} 
          }
          .shape:after {
            content: "";
            height: 100%;
            width: 100%;
            position: absolute;
            border-radius: 50%;
          }
        .: |
          ha-state-icon {
            {% if is_state(entity, 'printing') or
            is_state(entity, 'resuming')%}
              clip-path: inset(83% 72% 0 0);
            {% endif %}
          }
          ha-card {
            border: none;
          }
          mushroom-badge-icon {
            {% if is_state(entity, 'pausing') or
            is_state(entity, 'paused') %}
              animation: pulse 2s infinite;
            {% endif %}
          }
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        content: "{{ (states(entity) | float | round(1) ) }}°C"
        icon: mdi:printer-3d-nozzle-heat
        icon_color: "{% if (states(entity) | int) > 150 %}\n  #800000\t\n{% elif (states(entity) | int) > 100 %}\n  #B22222\n{% elif (states(entity) | int) > 50 %}\n  #FA8072\n{% else %}\n  blue\n{% endif %}"
        entity: sensor.octoprint_actual_tool0_temp
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border: none;
            }
      - type: template
        content: "{{ (states(entity) | float | round(1) )}} °C"
        icon: mdi:heating-coil
        icon_color: "{% if (states(entity) | int) > 50 %}\n  #800000\t\n{% elif (states(entity) | int) > 30 %}\n  #B22222\n{% elif (states(entity) | int) > 10 %}\n  #FA8072\n{% else %}\n  blue\n{% endif %}"
        entity: sensor.octoprint_actual_bed_temp
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border: none;
            }
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.octoprint_printing
            state: "on"
        chip:
          type: template
          content: >
            {{ states(entity) | as_timestamp | timestamp_custom('%d.%m %H:%M')
            }}
          icon: mdi:timer-outline
          entity: sensor.octoprint_start_time
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card {
              border: none;
              }
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.octoprint_printing
            state: "on"
        chip:
          type: template
          content: >
            {% set time = ((states(entity) | as_timestamp) - (now() |
            as_timestamp) | int) | int %} {% set minutes =

            ((time % 3600) / 60) | int %} {% set hours = ((time % 86400) / 3600)

            | int %} {% set days = (time / 86400) | int %}


            {%- if time < 60 -%}
              < 1m
              {%- else -%}
              {%- if days > 0 -%}
                {{ days }}d
              {%- endif -%}
              {%- if hours > 0 -%}
                {%- if days > 0 -%}
                  {{ ' ' }}
                {%- endif -%}
                {{ hours }}h
              {%- endif -%}
              {%- if minutes > 0 -%}
                {%- if days > 0 or hours > 0 -%}
                  {{ ' ' }}
                {%- endif -%}
                {{ minutes }}m
              {%- endif -%}
            {%- endif -%}
          icon: mdi:clock-check-outline
          entity: sensor.octoprint_estimated_finish_time
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card {
                border: none;
              }
    card_mod:
      style: |
        .chip-container {
          --chip-spacing: 0px;
        }
  - type: custom:mushroom-chips-card
    chips:
      - type: conditional
        conditions:
          - condition: or
            conditions:
              - condition: state
                entity: sensor.octoprint_current_state
                state: printing
              - condition: state
                entity: sensor.octoprint_current_state
                state: resuming
        chip:
          type: entity
          entity: button.octoprint_pause_job
          icon_color: white
          icon: mdi:pause
          content_info: none
          tap_action:
            action: toggle
          card_mod:
            style: |
              ha-card {
                --chip-background: rgba(var(--rgb-grey), 0.7);
                --icon-color: rgb(var(--rgb-white));
                margin: -7px 0px
              } 
      - type: conditional
        conditions:
          - condition: or
            conditions:
              - condition: state
                entity: sensor.octoprint_current_state
                state: paused
              - condition: state
                entity: sensor.octoprint_current_state
                state: pausing
        chip:
          type: entity
          entity: button.octoprint_resume_job
          icon_color: white
          icon: mdi:play
          content_info: none
          tap_action:
            action: toggle
          card_mod:
            style: |
              ha-card {
                --chip-background: rgba(var(--rgb-green), 0.7);
                --icon-color: rgb(var(--rgb-white));
                margin: -7px 0px
              } 
      - type: conditional
        conditions:
          - condition: or
            conditions:
              - condition: state
                entity: sensor.octoprint_current_state
                state: printing
              - condition: state
                entity: sensor.octoprint_current_state
                state: pausing
              - condition: state
                entity: sensor.octoprint_current_state
                state: paused
              - condition: state
                entity: sensor.octoprint_current_state
                state: resuming
        chip:
          type: entity
          entity: button.octoprint_shutdown_system
          icon_color: white
          icon: mdi:alert-octagon
          content_info: none
          tap_action:
            action: none
          hold_action:
            action: toggle
          card_mod:
            style: |
              ha-card {
                --chip-background: rgba(var(--rgb-red), 1);
                margin: -7px 0px
              } 
    card_mod:
      style: |
        ha-card {
            --chip-box-shadow: none;
            top: 16px;
            width: -webkit-fill-available;
            right: 12px;
            position: absolute;
        } 
        .chip-container {
            right: 0px;
            position: absolute;
        }
