substitutions:
  plug_name: plug_2
  device_name: Plug 2
  host_name: plug-2
  # Higher value gives lower power readout
  current_res: "0.00200"
  # Lower value gives lower voltage readout
  voltage_div: "650"
  
esphome:
  name: ${host_name}
  friendly_name: ${device_name}

esp8266:
  board: esp8285
  restore_from_flash: true

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: ${device_name}
    password: !secret ap_password
  
time:
  - platform: homeassistant
    id: homeassistant_time

logger:

web_server:
  port: 80
  include_internal: true

binary_sensor:
  # Binary sensor for the button press
  - platform: gpio
    name: Button
    pin:
      number: GPIO13
      inverted: true
    on_press:
      - switch.toggle: relay

switch:
  - platform: gpio
    id: relay
    name: Relay
    restore_mode: ALWAYS_OFF
    pin: GPIO15
    on_turn_on:
      - light.turn_on: led
    on_turn_off:
      - light.turn_off: led

sensor:
  - platform: hlw8012
    sel_pin:
      number: GPIO12
      inverted: True
    cf_pin: GPIO05
    cf1_pin: GPIO04
    current_resistor: ${current_res}
    voltage_divider: ${voltage_div}
    current:
      name: Current
      unit_of_measurement: A
    voltage:
      name: Voltage
      unit_of_measurement: V
    power:
      name: Power
      unit_of_measurement: W
      id: power
    change_mode_every: 8
    update_interval: 5s
  - platform: total_daily_energy
    name: Daily Energy
    power_id: power
    filters:
        # Multiplication factor from W to kW is 0.001
        - multiply: 0.001
    unit_of_measurement: kWh
      
# Extra sensor to keep track of plug uptime
  - platform: uptime
    name: Uptime
    
  - platform: wifi_signal
    name: WiFi Signal
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: WiFi IP
    ssid:
      name: WiFi SSID
    
output:
  # blue LED
  - platform: esp8266_pwm
    id: state_led
    pin:
      number: GPIO02    
      inverted: true

light:
  # Relay state light
  - platform: monochromatic
    id: led
    name: LED
    output: state_led

# green LED
status_led:
  pin:
    number: GPIO00     
    inverted: true