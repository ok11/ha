substitutions:
  host_name: dht-22
  device_name: DHT-22

esphome:
  name: ${host_name}
  friendly_name: ${device_name}
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  framework:
    type: esp-idf

web_server:
  port: 80
  include_internal: true

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: ${device_name}
    password: !secret ap_password

sensor:
  - platform: dht
    model: DHT22
    pin:
      number: GPIO13
      mode:
        input: true
        pullup: true
    temperature:
      name: Temperature
    humidity:
      name: Humidity
    update_interval: 60s
    