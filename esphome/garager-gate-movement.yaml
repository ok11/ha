substitutions:
  host_name: garage-gate-movement-sensor
  device_name: Garage Gate Movement
  debounce_delay: 300ms
  delta_threshold: 0.01

esphome:
  name: ${host_name}
  friendly_name: ${device_name}

esp8266:
  board: d1_mini

web_server:
  port: 80
  include_internal: true

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "${device_name}"
    password: !secret ap_password

captive_portal:

globals:
  - { id: last_value, type: float, initial_value: 'NAN' }
  - { id: cur_delta,  type: float, initial_value: '0' }

sensor:
  - platform: adc
    pin: A0
    internal: true
    id: voltage_value
    update_interval: 100ms
    filters:
      - multiply: 3.3
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1
    on_value:
      then:
        - lambda: |-
            ESP_LOGD("Voltage", "Value: %fV", x);
            if (!isnan(id(last_value))) id(cur_delta) = x - id(last_value);
            id(last_value) = x;

binary_sensor:
  - platform: template
    id: v_increasing
    internal: true
    lambda: "return id(cur_delta) >  ${delta_threshold};"
    filters:
      - delayed_on: ${debounce_delay}
  - platform: template
    id: v_decreasing
    internal: true
    lambda: "return id(cur_delta) < -${delta_threshold};"
    filters:
      - delayed_on: ${debounce_delay}
  - platform: homeassistant
    id: opener_switch
    entity_id: switch.garage_gate_opener
    on_state:
      then:
        - logger.log:
            level: DEBUG
            format: "Switch: %s"
            args: ['id(opener_switch).state ? "ON" : "OFF"']

text_sensor:
  - platform: template
    name: "Direction"
    id: direction
    update_interval: 100ms
    lambda: |-
      if (id(v_increasing).state) return std::string("increasing");
      if (id(v_decreasing).state) return std::string("decreasing");
      return std::string("steady");

