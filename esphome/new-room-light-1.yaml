substitutions:
  device_id: "new_room_light_1"
  device_name: "New Room Light 1"
  host_name: "new-room-light-1"

  ir_addr: "0xDEA8"
  code_on: "0xFE01"
  code_off: "0x00FF"
  code_bright_up: "0xFF00"
  code_bright_down: "0xF20D"
  code_temp_down: "0xF609"
  code_temp_up: "0xEA15"
  code_temp_6500k: "0xE916"
  code_temp_3000k: "0xEB14"
  code_temp_4000k: "0xF10E"
  code_night: "0xF50A"
  code_sleep_1h: "0xF906"
  code_sleep_60s: "0xF708"

esphome:
  name: ${host_name}
  friendly_name: ${device_name}
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  variant: esp32c3
  framework:
    type: esp-idf

web_server:
  port: 80
  include_internal: true

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: ${device_name}
    password: !secret ap_password

number:
  - platform: template
    name: "Brightness Step"
    id: ${device_id}_br_step
    min_value: 0
    max_value: 10
    step: 1
    restore_value: true
    initial_value: 5
    optimistic: true
    set_action: []

  - platform: template
    name: "Temperature Step"
    id: ${device_id}_ct_step
    min_value: 0
    max_value: 10
    step: 1
    restore_value: true
    initial_value: 5
    optimistic: true
    set_action: []

switch:
  - platform: template
    name: "Power State"
    id: ${device_id}_state
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true

remote_receiver:
  id: ir_rx
  pin: 
    number: GPIO3
    mode:
      input: true
      pullup: true
    inverted: true
  dump: [ nec ]
  idle: 30ms
  filter: 100us
  on_nec:
    then:
      - lambda: |-
          if (x.address == ${ir_addr}) {
            uint16_t cmd = x.command;
            
            if (cmd == ${code_bright_up}) {
              auto val = id(${device_id}_br_step).state;
              if (val < 10) id(${device_id}_br_step).publish_state(val + 1);
            } else if (cmd == ${code_bright_down}) {
              auto val = id(${device_id}_br_step).state;
              if (val > 0) id(${device_id}_br_step).publish_state(val - 1);
            } else if (cmd == ${code_temp_up}) {
              auto val = id(${device_id}_ct_step).state;
              if (val < 10) id(${device_id}_ct_step).publish_state(val + 1);
            } else if (cmd == ${code_temp_down}) {
              auto val = id(${device_id}_ct_step).state;
              if (val > 0) id(${device_id}_ct_step).publish_state(val - 1);
            } else if (cmd == ${code_on}) {
              id(${device_id}_state).publish_state(true);
            } else if (cmd == ${code_off}) {
              id(${device_id}_state).publish_state(false);
            } else if (cmd == ${code_temp_6500k}) {
              id(${device_id}_ct_step).publish_state(10);
            } else if (cmd == ${code_temp_3000k}) {
              id(${device_id}_ct_step).publish_state(0);
            } else if (cmd == ${code_temp_4000k}) {
              id(${device_id}_ct_step).publish_state(5);
            } else if (cmd == ${code_night}) {
              id(${device_id}_state).publish_state(true);
              id(${device_id}_ct_step).publish_state(0);
              id(${device_id}_br_step).publish_state(0);
            }
          }

remote_transmitter:
  - pin: GPIO4
    carrier_duty_percent: 33%
    id: ir_tx
    non_blocking: true

button:
  - platform: template
    name: "Power On"
    id: ${device_id}_on
    on_press:
      - remote_transmitter.transmit_nec:
          address: ${ir_addr}
          command: ${code_on}

  - platform: template
    name: "Power Off"
    id: ${device_id}_off
    on_press:
      - remote_transmitter.transmit_nec:
          address: ${ir_addr}
          command: ${code_off}

  - platform: template
    name: "Brightness Up"
    id: ${device_id}_bright_up
    on_press:
      - remote_transmitter.transmit_nec:
          address: ${ir_addr}
          command: ${code_bright_up}

  - platform: template
    name: "Brightness Down"
    id: ${device_id}_bright_down
    on_press:
      - remote_transmitter.transmit_nec:
          address: ${ir_addr}
          command: ${code_bright_down}

  - platform: template
    name: "Temperature Up"
    id: ${device_id}_temp_up
    on_press:
      - remote_transmitter.transmit_nec:
          address: ${ir_addr}
          command: ${code_temp_up}

  - platform: template
    name: "Temperature Down"
    id: ${device_id}_temp_down
    on_press:
      - remote_transmitter.transmit_nec:
          address: ${ir_addr}
          command: ${code_temp_down}

  - platform: template
    name: "Preset Temp 6500K"
    id: ${device_id}_preset_temp_6500k
    on_press:
      - remote_transmitter.transmit_nec:
          address: ${ir_addr}
          command: ${code_temp_6500k}

  - platform: template
    name: "Preset Temp 3000K"
    id: ${device_id}_preset_temp_3000k
    on_press:
      - remote_transmitter.transmit_nec:
          address: ${ir_addr}
          command: ${code_temp_3000k}

  - platform: template
    name: "Preset Temp 4000K"
    id: ${device_id}_preset_temp_4000k
    on_press:
      - remote_transmitter.transmit_nec:
          address: ${ir_addr}
          command: ${code_temp_4000k}

  - platform: template
    name: "Preset Night"
    id: ${device_id}_preset_night
    on_press:
      - remote_transmitter.transmit_nec:
          address: ${ir_addr}
          command: ${code_night}

  - platform: template
    name: "Sleep 1h"
    id: ${device_id}_sleep_1h
    on_press:
      - remote_transmitter.transmit_nec:
          address: ${ir_addr}
          command: ${code_sleep_1h}

  - platform: template
    name: "Sleep 60s"
    id: ${device_id}_sleep_60s
    on_press:
      - remote_transmitter.transmit_nec:
          address: ${ir_addr}
          command: ${code_sleep_60s}

  - platform: template
    name: "Reset"
    id: ${device_id}_reset
    on_press:
      - lambda: |-
          id(${device_id}_on).press();
          for (int i = 0; i < 12; i++) {
            id(${device_id}_bright_down).press();
            id(${device_id}_temp_down).press();
          }
          for (int i = 0; i < 5; i++) {
            id(${device_id}_bright_up).press();
            id(${device_id}_temp_up).press();
          }
          id(${device_id}_br_step).publish_state(5);
          id(${device_id}_ct_step).publish_state(5);
          id(${device_id}_state).publish_state(true);

sensor:
  - platform: internal_temperature
    name: "CPU Temperature"
