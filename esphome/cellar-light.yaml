substitutions:
  host_name: cellar-light
  device_name: Cellar Light
 
esphome:
  name: ${host_name}
  friendly_name: ${device_name}

esp8266:
  board: esp01_1m

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: ${device_name}
    password: !secret ap_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

switch:
  - platform: gpio
    pin: GPIO4
    name: None
    id: relay
    restore_mode: RESTORE_DEFAULT_OFF

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO5
      mode: INPUT
    name: "Input"
    on_state:
      then:
        - switch.toggle: relay