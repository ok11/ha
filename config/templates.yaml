          action: switch.turn_on
      turn_off:
        - target:
            entity_id:
              - button.new_room_light_1_power_off
          action: button.press
        - target:
            entity_id:
              - switch.new_room_light_1_power_state
          action: switch.turn_off
      set_level:
        - variables:
            target: "{{ (brightness / 25.5) | int }}"
            current: "{{ states('number.new_room_light_1_brightness_step') | int }}"
        - sequence:
            - repeat:
                count: "{{ (target - current) | abs }}"
                sequence:
                  - action: button.press
                    target:
                      entity_id: |-
                        {% if target > current %}
