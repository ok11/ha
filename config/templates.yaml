              data:
                value: "{{ target }}"

- sensor:
    - name: "Last litter visit"
      unique_id: last_litter_visit
      state: "{{ trigger.to_state.last_changed.timestamp() | int(0) }}"
      attributes:
        cat: "{{ cat }}"
        weight: "{{ weight }}"
        duration: "{{ duration }}"
        visit_number_today: "{{ visit }}"
        at: "{{ now().isoformat() }}"
  trigger:
    - platform: state
      entity_id: sensor.cat_litter_box_number_of_excretion
  condition:
    - condition: template
      value_template: >
        {{ trigger.from_state.state not in ['unknown', 'unavailable']
          and trigger.to_state.state not in ['unknown', 'unavailable']
          and trigger.to_state.state | int(-1) > trigger.from_state.state | int(-1) }}
  variables:
    weight: "{{ states('sensor.cat_litter_box_cat_weight') | float(0) }}"
    duration: "{{ states('sensor.cat_litter_box_duration_of_excretion') | int(0) }}"
    visit: "{{ states('sensor.cat_litter_box_number_of_excretion')  | int(0) }}"
    cat: >
      {% if 3500 <= weight <= 5000 %}Danny
      {% elif 5500 <= weight <= 8000 %}Sammy
      {% else %}unknown ({{ weight }}g){% endif %}
  action:
    - event: cat_litter_visit
      event_data:
        cat: "{{ cat }}"
        weight: "{{ weight }}"
        duration: "{{ duration }}"
        visit_number_today: "{{ trigger.to_state.state | int }}"
        at: "{{ trigger.to_state.last_changed.isoformat() }}"
