      set_temperature:
        - variables:
            kelvin: "{{ 1000000 / color_temp }}"
            target: "{{ [1, [10, ((kelvin - 3000) * 9 / 3500 + 1) | round(0) | int] | min] | max }}"
            current: "{{ states('number.new_room_light_1_temperature_step') | int }}"
        - sequence:
            - repeat:
